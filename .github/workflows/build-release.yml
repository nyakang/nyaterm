name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup-caches:
    name: Cleanup old caches
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Delete old Actions caches
        uses: actions/github-script@v8
        with:
          script: |
            // Delete actions caches older than 90 days to avoid stale/large caches.
            const threshold = Date.now() - (90 * 24 * 60 * 60 * 1000);
            const oldCaches = [];

            let page = 1;
            while (true) {
              const { data } = await github.rest.actions.getActionsCacheList({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page,
              });

              const caches = data.actions_caches || [];
              for (const cache of caches) {
                const created = new Date(cache.created_at).getTime();
                if (created < threshold) {
                  oldCaches.push(cache);
                }
              }

              if (caches.length < 100) break;
              page += 1;
            }

            console.log(`Found ${oldCaches.length} cache(s) older than 90 days.`);

            for (const cache of oldCaches) {
              console.log(`Deleting cache: ${cache.key} (created: ${cache.created_at})`);
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              });
            }

            console.log(`Deleted ${oldCaches.length} old cache(s).`);

  build:
    name: Build ${{ matrix.target }}
    needs: cleanup-caches
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin

          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin

          - platform: ubuntu-24.04
            args: ''
            target: x86_64-unknown-linux-gnu

          - platform: ubuntu-24.04-arm
            args: ''
            target: aarch64-unknown-linux-gnu

          - platform: windows-latest
            args: --bundles nsis
            target: x86_64-pc-windows-msvc

          - platform: windows-latest
            args: --target aarch64-pc-windows-msvc --bundles nsis
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        if: matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./cli -> target
          key: ${{ matrix.platform }}-${{ matrix.target }}
          cache-on-failure: false
        env:
          RUST_CACHE_COMPRESS: true

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            build-essential \
            curl \
            wget \
            file \
            xdg-utils

          if [ "${{ matrix.platform }}" = "ubuntu-24.04-arm" ]; then
            sudo apt-get install -y libfuse2t64
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: release_notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=""

          if NOTES=$(pnpm --silent release:notes "$VERSION" --stdout 2>/dev/null); then
            HAS_CHANGELOG=true
          else
            HAS_CHANGELOG=false
          fi

          if [ "$HAS_CHANGELOG" = "false" ]; then
            PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p' || true)

            if [ -n "$PREV_TAG" ]; then
              AUTO_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
                -f tag_name="${GITHUB_REF_NAME}" \
                -f previous_tag_name="$PREV_TAG" \
                --jq '.body' 2>/dev/null || true)
            else
              AUTO_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
                -f tag_name="${GITHUB_REF_NAME}" \
                --jq '.body' 2>/dev/null || true)
            fi

            if [ -n "${AUTO_NOTES:-}" ]; then
              NOTES="$AUTO_NOTES"
            else
              NOTES="See the assets below to download the installer for your platform."
            fi
          fi

          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build CLI companion
        shell: bash
        run: |
          set -euo pipefail

          cd cli
          cargo build --release --target ${{ matrix.target }}

          mkdir -p ../src-tauri/cli-bin

          if [[ "${{ matrix.platform }}" == *"windows"* ]]; then
            cp "target/${{ matrix.target }}/release/oxt.exe" ../src-tauri/cli-bin/oxt.exe
          else
            cp "target/${{ matrix.target }}/release/oxt" ../src-tauri/cli-bin/oxt
          fi

          ls -la ../src-tauri/cli-bin/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '1' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: OxideTerm ${{ github.ref_name }}
          releaseBody: ${{ steps.release_notes.outputs.body || 'See the assets below to download the installer for your platform.' }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  rename-assets:
    name: Rename release assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Rename assets to consistent naming
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            function getNewAssetName(assetName) {
              if (assetName === 'latest.json') return null;

              const sigSuffix = assetName.endsWith('.sig') ? '.sig' : '';
              const name = sigSuffix ? assetName.slice(0, -4) : assetName;

              const rules = [
                // macOS DMG
                {
                  match: /^OxideTerm.*[_-](aarch64|arm64)\.dmg$/i,
                  newName: `OxideTerm_${version}_macos_arm64.dmg`,
                },
                {
                  match: /^OxideTerm.*[_-](x64|x86_64)\.dmg$/i,
                  newName: `OxideTerm_${version}_macos_x64.dmg`,
                },

                // macOS updater
                {
                  match: /^OxideTerm.*[_-](aarch64|arm64)\.app\.tar\.gz$/i,
                  newName: `OxideTerm_${version}_macos_arm64.app.tar.gz`,
                },
                {
                  match: /^OxideTerm.*[_-](x64|x86_64)\.app\.tar\.gz$/i,
                  newName: `OxideTerm_${version}_macos_x64.app.tar.gz`,
                },

                // Linux DEB
                {
                  match: /^OxideTerm.*[_-](amd64|x86_64|x64)\.deb$/i,
                  newName: `OxideTerm_${version}_linux_x64.deb`,
                },
                {
                  match: /^OxideTerm.*[_-](arm64|aarch64)\.deb$/i,
                  newName: `OxideTerm_${version}_linux_arm64.deb`,
                },

                // Linux RPM
                {
                  match: /^OxideTerm.*[._-](x86_64|amd64|x64)\.rpm$/i,
                  newName: `OxideTerm_${version}_linux_x64.rpm`,
                },
                {
                  match: /^OxideTerm.*[._-](aarch64|arm64)\.rpm$/i,
                  newName: `OxideTerm_${version}_linux_arm64.rpm`,
                },

                // Linux AppImage
                {
                  match: /^OxideTerm.*[_-](amd64|x86_64|x64)\.AppImage$/i,
                  newName: `OxideTerm_${version}_linux_x64.AppImage`,
                },
                {
                  match: /^OxideTerm.*[_-](aarch64|arm64)\.AppImage$/i,
                  newName: `OxideTerm_${version}_linux_arm64.AppImage`,
                },

                // Windows NSIS installer
                {
                  match: /^OxideTerm.*[_-](x64|x86_64|amd64)-setup\.exe$/i,
                  newName: `OxideTerm_${version}_windows_x64-setup.exe`,
                },
                {
                  match: /^OxideTerm.*[_-](arm64|aarch64)-setup\.exe$/i,
                  newName: `OxideTerm_${version}_windows_arm64-setup.exe`,
                },

                // Windows NSIS updater
                {
                  match: /^OxideTerm.*[_-](x64|x86_64|amd64)-setup\.nsis\.zip$/i,
                  newName: `OxideTerm_${version}_windows_x64-setup.nsis.zip`,
                },
                {
                  match: /^OxideTerm.*[_-](arm64|aarch64)-setup\.nsis\.zip$/i,
                  newName: `OxideTerm_${version}_windows_arm64-setup.nsis.zip`,
                },
              ];

              for (const rule of rules) {
                if (rule.match.test(name)) {
                  return `${rule.newName}${sigSuffix}`;
                }
              }

              return null;
            }

            const existingNames = new Set(release.assets.map(asset => asset.name));
            const renames = [];

            for (const asset of release.assets) {
              const newName = getNewAssetName(asset.name);
              if (!newName || newName === asset.name) continue;

              if (existingNames.has(newName)) {
                console.log(`Skip rename because target already exists: ${asset.name} -> ${newName}`);
                continue;
              }

              renames.push({
                id: asset.id,
                oldName: asset.name,
                newName,
              });

              existingNames.add(newName);
            }

            for (const { id, oldName, newName } of renames) {
              console.log(`Renaming: ${oldName} -> ${newName}`);
              await github.rest.repos.updateReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: id,
                name: newName,
              });
            }

            console.log(`Renamed ${renames.length} asset(s).`);

  publish-updater:
    name: Generate updater manifest
    needs: rename-assets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Build and upload latest.json
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const allAssets = release.assets;

            function mapSigToPlatforms(name) {
              const baseName = name.replace(/\.sig$/, '');
              const keys = [];

              if (name.endsWith('.app.tar.gz.sig')) {
                if (name.includes('macos_x64') || name.includes('x64') || name.includes('x86_64')) {
                  keys.push('darwin-x86_64', 'darwin-x86_64-app');
                } else if (name.includes('macos_arm64') || name.includes('aarch64') || name.includes('arm64')) {
                  keys.push('darwin-aarch64', 'darwin-aarch64-app');
                }
              } else if (name.endsWith('.AppImage.sig')) {
                if (name.includes('linux_x64') || name.includes('amd64') || name.includes('x86_64')) {
                  keys.push('linux-x86_64', 'linux-x86_64-appimage');
                } else if (name.includes('linux_arm64') || name.includes('aarch64') || name.includes('arm64')) {
                  keys.push('linux-aarch64', 'linux-aarch64-appimage');
                }
              } else if (name.endsWith('.deb.sig')) {
                if (name.includes('linux_x64') || name.includes('amd64') || name.includes('x86_64')) {
                  keys.push('linux-x86_64-deb');
                } else if (name.includes('linux_arm64') || name.includes('aarch64') || name.includes('arm64')) {
                  keys.push('linux-aarch64-deb');
                }
              } else if (name.endsWith('.rpm.sig')) {
                if (name.includes('linux_x64') || name.includes('x86_64')) {
                  keys.push('linux-x86_64-rpm');
                } else if (name.includes('linux_arm64') || name.includes('aarch64') || name.includes('arm64')) {
                  keys.push('linux-aarch64-rpm');
                }
              } else if (name.endsWith('-setup.exe.sig')) {
                if (name.includes('windows_x64') || name.includes('x64') || name.includes('x86_64')) {
                  keys.push('windows-x86_64', 'windows-x86_64-nsis');
                } else if (name.includes('windows_arm64') || name.includes('arm64') || name.includes('aarch64')) {
                  keys.push('windows-aarch64', 'windows-aarch64-nsis');
                }
              }

              return { keys, baseName };
            }

            const platforms = {};
            const sigAssets = allAssets.filter(asset => asset.name.endsWith('.sig'));

            for (const sigAsset of sigAssets) {
              const { keys, baseName } = mapSigToPlatforms(sigAsset.name);
              if (keys.length === 0) {
                console.log(`Skip unmapped signature asset: ${sigAsset.name}`);
                continue;
              }

              const binaryAsset = allAssets.find(asset => asset.name === baseName);
              if (!binaryAsset) {
                console.log(`Warning: no binary asset found for ${baseName}`);
                continue;
              }

              const sigResponse = await fetch(sigAsset.browser_download_url);
              if (!sigResponse.ok) {
                console.log(`Warning: failed to download signature: ${sigAsset.name}`);
                continue;
              }

              const signature = (await sigResponse.text()).trim();
              const url = binaryAsset.browser_download_url;

              for (const key of keys) {
                platforms[key] = { signature, url };
              }
            }

            const platformCount = Object.keys(platforms).length;
            if (platformCount === 0) {
              core.setFailed('No updater platforms were generated. Check whether Tauri signing produced .sig assets.');
              return;
            }

            const latestJson = {
              version,
              notes: release.body || '',
              pub_date: release.published_at || new Date().toISOString(),
              platforms,
            };

            const existing = allAssets.find(asset => asset.name === 'latest.json');
            if (existing) {
              console.log('Deleting existing latest.json');
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            const content = JSON.stringify(latestJson, null, 2);

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'latest.json',
              data: content,
              headers: {
                'content-type': 'application/json',
                'content-length': Buffer.byteLength(content),
              },
            });

            console.log(`Uploaded latest.json with ${platformCount} platform key(s):`);
            for (const key of Object.keys(platforms).sort()) {
              console.log(`  ${key}: ${platforms[key].url.split('/').pop()}`);
            }

  cleanup-sigs:
    name: Remove .sig files from release
    needs: publish-updater
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Delete .sig assets from release
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const sigAssets = release.assets.filter(asset => asset.name.endsWith('.sig'));

            for (const asset of sigAssets) {
              console.log(`Deleting signature asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
            }

            console.log(`Deleted ${sigAssets.length} .sig file(s).`);

  publish-beta-updater:
    name: Publish beta updater manifest
    needs: cleanup-sigs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Upload latest.json to updater-beta release
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const latestJsonAsset = release.assets.find(asset => asset.name === 'latest.json');
            if (!latestJsonAsset) {
              core.setFailed('No latest.json found on current release.');
              return;
            }

            const resp = await fetch(latestJsonAsset.browser_download_url);
            if (!resp.ok) {
              core.setFailed(`Failed to download latest.json from release ${tag}`);
              return;
            }

            const content = await resp.text();

            let betaRelease;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'updater-beta',
              });
              betaRelease = data;
            } catch (error) {
              if (error.status === 404) {
                const { data } = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: 'updater-beta',
                  name: 'Beta Updater Manifest',
                  body: 'This release hosts the latest.json for the beta update channel. Do not delete.',
                  prerelease: true,
                  draft: false,
                });
                betaRelease = data;
              } else {
                throw error;
              }
            }

            const existingAsset = betaRelease.assets.find(asset => asset.name === 'latest.json');
            if (existingAsset) {
              console.log('Deleting existing updater-beta latest.json');
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existingAsset.id,
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: betaRelease.id,
              name: 'latest.json',
              data: content,
              headers: {
                'content-type': 'application/json',
                'content-length': Buffer.byteLength(content),
              },
            });

            console.log(`Uploaded latest.json to updater-beta release for ${tag}`);
